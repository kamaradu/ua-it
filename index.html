<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Word Player</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Word Player</h1>

  <div id="controls">
    <button id="btnPlay">▶️ Play</button>
    <button id="btnPause">⏸ Pause</button>
    <button id="btnNext">⏭</button>
    <button id="btnPrev">⏮</button>
    <button id="btnRandom">🔀 Random</button>
  </div>

  <div id="currentWord" class="current"></div>

  <div id="list"></div>

  <script src="script.js"></script>
</body>
</html>
