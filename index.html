<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Word Player</title>

<style>
:root {
  --bg: #0f0f10;
  --card: #1c1c1e;
  --text: #ffffff;
  --secondary: #8e8e93;
  --accent: #0a84ff;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding-bottom: 90px;
}

.player {
  text-align: center;
  padding: 24px 16px 10px;
}

.current {
  font-size: 34px;
  font-weight: 600;
}

.translation {
  font-size: 20px;
  color: var(--secondary);
  margin-top: 6px;
}

.list {
  padding: 12px;
}

.row {
  background: var(--card);
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.row.active {
  outline: 2px solid var(--accent);
}

.word {
  display: flex;
  flex-direction: column;
}

.it {
  font-size: 18px;
}

.ua {
  font-size: 14px;
  color: var(--secondary);
}

.tr {
  font-size: 12px;
  color: #8e8e93;
}

.cat {
  font-size: 11px;
  background: #2c2c2e;
  padding: 4px 8px;
  border-radius: 999px;
  display: inline-block;
  margin-top: 4px;
}

.play-btn {
  min-width: 40px;
  min-height: 40px;
  border-radius: 12px;
  border: none;
  background: #2c2c2e;
  color: white;
  font-size: 16px;
}

.controls-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
  background: rgba(28,28,30,0.9);
  backdrop-filter: blur(20px);
  display: flex;
  justify-content: space-around;
}

.ctrl-btn {
  min-width: 44px;
  min-height: 44px;
  border-radius: 12px;
  border: none;
  background: var(--card);
  color: white;
  font-size: 18px;
}

.ctrl-btn:active {
  transform: scale(0.92);
}
</style>
</head>

<body>

<div class="player">
  <div id="currentWord" class="current">—</div>
  <div id="currentTranslation" class="translation"></div>
</div>

<div id="list" class="list"></div>

<div class="controls-bar">
  <button class="ctrl-btn" onclick="toggleRandom()" id="randomBtn" style="opacity:0.5">🔀</button>
  <button class="ctrl-btn" onclick="prev()">⏮</button>
  <button class="ctrl-btn" onclick="play()">▶️</button>
  <button class="ctrl-btn" onclick="pause()">⏸</button>
  <button class="ctrl-btn" onclick="next()">⏭</button>
</div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRYxU7tQ9zljOOosiBseSOOUUmNHINufeWHdczDkEZMXzqPHyO81aXhrvQojO42j8AW5teS_nROvrKe/pub?gid=0&single=true&output=csv";

let words = [];
let index = 0;
let playing = false;
let timeout;
let randomMode = false;
let lastIndex = -1;

const DELAY = 3000;

// LOAD
async function loadWords() {
  const res = await fetch(url);
  const text = await res.text();

  return text.split("\n")
    .map(r => r.split(","))
    .filter(r => r.length >= 2)
    .map(r => ({
      it: r[0].replace(/"/g, "").trim(),
      ua: r[1].replace(/"/g, "").trim(),
      tr: r[2]?.replace(/"/g, "").trim() || "",
      cat: r[3]?.replace(/"/g, "").trim() || ""
    }));
}

// RENDER
function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  words.forEach((w, i) => {
    const row = document.createElement("div");
    row.className = "row" + (i === index ? " active" : "");

    row.innerHTML = `
      <div class="word">
        <div class="it">${w.it}</div>
        <div class="ua">${w.ua}</div>
        <div class="tr">${w.tr}</div>
        <div class="cat">${w.cat}</div>
      </div>
      <button class="play-btn" onclick="playOne(${i})">▶️</button>
    `;

    list.appendChild(row);
  });

  document.getElementById("currentWord").innerText = words[index]?.it || "";
  document.getElementById("currentTranslation").innerText = words[index]?.ua || "";
}

// SPEAK
function speak(text, lang) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  speechSynthesis.speak(u);
}

// SEQUENCE
function playSequence(i) {
  clearTimeout(timeout);
  speechSynthesis.cancel();

  index = i;
  localStorage.setItem("pos", index);
  render();

  const w = words[i];

  speak(w.it, "it-IT");

  timeout = setTimeout(() => {
    speak(w.ua, "uk-UA");

    timeout = setTimeout(() => {
      speak(w.ua, "uk-UA");

      if (playing) {
        timeout = setTimeout(next, DELAY);
      }

    }, DELAY);

  }, DELAY);
}

// CONTROLS
function play() {
  playing = true;
  playSequence(index);
}

function pause() {
  playing = false;
  speechSynthesis.cancel();
  clearTimeout(timeout);
}

function next() {
  if (randomMode) {
    let newIndex;
    do {
      newIndex = Math.floor(Math.random() * words.length);
    } while (newIndex === lastIndex && words.length > 1);

    lastIndex = newIndex;
    index = newIndex;
  } else {
    index = (index + 1) % words.length;
  }

  playSequence(index);
}

function prev() {
  index = (index - 1 + words.length) % words.length;
  playSequence(index);
}

function playOne(i) {
  playing = false;
  playSequence(i);
}

function toggleRandom() {
  randomMode = !randomMode;
  document.getElementById("randomBtn").style.opacity = randomMode ? "1" : "0.5";
}

// INIT
async function init() {
  words = await loadWords();
  index = parseInt(localStorage.getItem("pos")) || 0;
  render();
}

init();
</script>

</body>
</html>
