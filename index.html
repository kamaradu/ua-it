<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Word Player</title>

<style>
:root {
  --bg: #0f0f10;
  --card: #1c1c1e;
  --text: #ffffff;
  --secondary: rgba(255,255,255,0.75);
  --accent: #0a84ff;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding-bottom: 100px;
}

/* FILTERS */
.filters {
  position: sticky;
  top: 0;
  padding: 10px;
  background: rgba(28,28,30,0.9);
  backdrop-filter: blur(20px);
  display: flex;
  gap: 8px;
  overflow-x: auto;
}

.chip {
  background: #2c2c2e;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  white-space: nowrap;
}

.chip.active {
  border: 1px solid var(--accent);
}

/* PLAYER */
.player {
  text-align: center;
  padding: 20px;
}

.current {
  font-size: 34px;
  font-weight: 600;
}

.translation {
  font-size: 18px;
  color: var(--secondary);
}

/* LIST */
.list {
  padding: 12px;
}

.row {
  background: var(--card);
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.row.active {
  outline: 2px solid var(--accent);
}

.word {
  display: flex;
  flex-direction: column;
}

.main {
  font-size: 18px;
}

.ua {
  opacity: 0.75;
}

.tr {
  font-size: 12px;
  color: #8e8e93;
}

.cat {
  font-size: 11px;
  background: #2c2c2e;
  padding: 4px 10px;
  border-radius: 999px;
  display: inline-block;
  margin-top: 4px;
  width: fit-content;
}

/* BUTTONS */
.play-btn {
  min-width: 44px;
  min-height: 44px;
  border-radius: 12px;
  border: none;
  background: #2c2c2e;
  color: white;
}

/* CONTROLS */
.controls-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
  background: rgba(28,28,30,0.9);
  backdrop-filter: blur(20px);
  display: flex;
  justify-content: space-around;
}

.ctrl-btn {
  min-width: 44px;
  min-height: 44px;
  border-radius: 12px;
  border: none;
  background: var(--card);
  color: white;
  font-size: 18px;
}
</style>
</head>

<body>

<div id="filters" class="filters"></div>

<div class="player">
  <div id="currentWord" class="current">—</div>
</div>

<div id="list" class="list"></div>

<div class="controls-bar">
  <button class="ctrl-btn" onclick="toggleRandom()" id="randomBtn" style="opacity:0.5">🔀</button>
  <button class="ctrl-btn" onclick="prev()">⏮</button>
  <button class="ctrl-btn" onclick="play()">▶️</button>
  <button class="ctrl-btn" onclick="pause()">⏸</button>
  <button class="ctrl-btn" onclick="next()">⏭</button>
</div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRYxU7tQ9zljOOosiBseSOOUUmNHINufeWHdczDkEZMXzqPHyO81aXhrvQojO42j8AW5teS_nROvrKe/pub?gid=0&single=true&output=csv";

let words = [];
let filteredWords = [];
let index = 0;
let playing = false;
let timeout;
let randomMode = false;
let lastIndex = -1;
let currentCategory = "ALL";

const DELAY = 3000;

// LOAD
async function loadWords() {
  const res = await fetch(url);
  const text = await res.text();

  return text.split("\n")
    .slice(1)
    .map(r => r.split(","))
    .filter(r => r.length >= 3)
    .map(r => ({
      it: r[0]?.replace(/"/g,"").trim(),
      tr: r[1]?.replace(/"/g,"").trim(),
      ua: r[2]?.replace(/"/g,"").trim(),
      cat: r[3]?.replace(/"/g,"").trim() || "other"
    }));
}

// FILTERS
function renderFilters() {
  const cats = ["ALL", ...new Set(words.map(w => w.cat))];
  document.getElementById("filters").innerHTML = cats.map(c =>
    `<div class="chip ${c===currentCategory?"active":""}" onclick="setCategory('${c}')">${c}</div>`
  ).join("");
}

function setCategory(cat) {
  currentCategory = cat;
  filteredWords = cat === "ALL" ? words : words.filter(w => w.cat === cat);
  index = 0;
  renderFilters();
  render();
}

// RENDER
function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  filteredWords.forEach((w,i)=>{
    const row = document.createElement("div");
    row.className = "row" + (i===index ? " active": "");

    row.innerHTML = `
      <div class="word">
        <div class="main">${w.it} / <span class="ua">${w.ua}</span></div>
        <div class="tr">[${w.tr}]</div>
        <div class="cat">${w.cat}</div>
      </div>
      <button class="play-btn" onclick="playOne(${i})">▶️</button>
    `;
    list.appendChild(row);
  });

  const current = filteredWords[index];
  document.getElementById("currentWord").innerText =
    current ? `${current.it} / ${current.ua}` : "";
}

// SPEAK
function speak(text, lang) {
  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);

  const voices = speechSynthesis.getVoices();

  const preferred = voices.find(v =>
    v.lang.startsWith(lang) &&
    (
      v.name.includes("Google") ||
      v.name.includes("Premium") ||
      v.name.includes("Natural")
    )
  ) || voices.find(v => v.lang.startsWith(lang));

  if (preferred) u.voice = preferred;

  u.rate = 0.9;   // трохи повільніше = природніше
  u.pitch = 1;

  speechSynthesis.speak(u);
}

// SEQUENCE
function playSequence(i) {
  clearTimeout(timeout);
  speechSynthesis.cancel();

  index = i;
  localStorage.setItem("pos", index);
  render();

  const w = filteredWords[i];

  speak(w.it, "it");

  timeout = setTimeout(()=>{
    speak(w.ua, "uk");
    timeout = setTimeout(()=>{
      speak(w.ua, "uk");
      if(playing) timeout = setTimeout(next, DELAY);
    }, DELAY);
  }, DELAY);
}

// CONTROLS
function play(){ playing=true; playSequence(index); }
function pause(){ playing=false; speechSynthesis.cancel(); clearTimeout(timeout); }

function next(){
  if(randomMode){
    let n;
    do{ n=Math.floor(Math.random()*filteredWords.length); }
    while(n===lastIndex && filteredWords.length>1);
    lastIndex=n;
    index=n;
  } else {
    index=(index+1)%filteredWords.length;
  }
  playSequence(index);
}

function prev(){
  index=(index-1+filteredWords.length)%filteredWords.length;
  playSequence(index);
}

function playOne(i){
  playing=false;
  playSequence(i);
}
function toggleRandom(){
  randomMode=!randomMode;
  document.getElementById("randomBtn").style.opacity=randomMode?"1":"0.5";
}

// INIT
async function init(){
  words = await loadWords();
  filteredWords = words;
  index = parseInt(localStorage.getItem("pos")) || 0;
  renderFilters();
  render();
}

init();
</script>

</body>
</html>
