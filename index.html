<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Word Player</title>
  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header Display Section -->
  <div class="header-display">
    <div id="currentWord" class="current-word-display"></div>
  </div>

  <!-- Words Count with Rotating Phrase -->
  <div class="words-count-section">
    <div class="words-count">
      <span id="wordsCount">0</span> слів
    </div>
    <div class="rotating-phrase" id="rotatingPhrase">
      Готуйся до нового вікторини
    </div>
  </div>

  <!-- List Section -->
  <div id="list" class="list-container"></div>

  <!-- Fixed Controls Bar -->
  <div id="controls" class="controls-bar">
    <button id="btnPlay" class="btn-control" title="Play">
      <i class="fas fa-play"></i>
    </button>
    <button id="btnPause" class="btn-control" title="Pause">
      <i class="fas fa-pause"></i>
    </button>
    <button id="btnPrev" class="btn-control" title="Previous">
      <i class="fas fa-step-backward"></i>
    </button>
    <button id="btnNext" class="btn-control" title="Next">
      <i class="fas fa-step-forward"></i>
    </button>
    <button id="btnRandom" class="btn-control" title="Shuffle">
      <i class="fas fa-shuffle"></i>
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
